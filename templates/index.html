<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRED Economic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef1f7; color: #333; }
        header {
            background: linear-gradient(135deg, #1a2b4a, #2d4a7a);
            color: white;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.3px; }
        header p { font-size: 0.8rem; opacity: 0.65; margin-top: 4px; }
        #last-updated { font-size: 0.78rem; opacity: 0.6; text-align: right; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            padding: 32px 40px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .stats { display: flex; gap: 32px; margin-bottom: 20px; }
        .stat-item { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #1a2b4a; line-height: 1; }
        .stat-change { font-size: 0.85rem; font-weight: 600; margin-top: 2px; }
        .up { color: #2a9d8f; }
        .down { color: #e63946; }

        .filter-buttons { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter-btn {
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #555;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .filter-btn:hover { border-color: #1a2b4a; color: #1a2b4a; }
        .filter-btn.active { background: #1a2b4a; color: white; border-color: #1a2b4a; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>FRED Dashboard</h1>
            <p>Data sourced from the Federal Reserve Bank of St. Louis</p>
        </div>
        <div id="last-updated"></div>
    </header>
    <div class="grid">
        <div class="card">
            <h2>Unemployment Rate (%)</h2>
            <div class="stats" id="unemploymentStats"></div>
            <div class="filter-buttons">
                <button class="filter-btn" data-range="1M">1M</button>
                <button class="filter-btn" data-range="6M">6M</button>
                <button class="filter-btn" data-range="1Y">1Y</button>
                <button class="filter-btn" data-range="5Y">5Y</button>
                <button class="filter-btn" data-range="10Y">10Y</button>
                <button class="filter-btn" data-range="All">All</button>
            </div>
            <canvas id="unemploymentChart"></canvas>
        </div>
        <div class="card">
            <h2>CPI Inflation Index</h2>
            <div class="stats" id="inflationStats"></div>
            <div class="filter-buttons">
                <button class="filter-btn" data-range="1M">1M</button>
                <button class="filter-btn" data-range="6M">6M</button>
                <button class="filter-btn" data-range="1Y">1Y</button>
                <button class="filter-btn" data-range="5Y">5Y</button>
                <button class="filter-btn" data-range="10Y">10Y</button>
                <button class="filter-btn" data-range="All">All</button>
            </div>
            <canvas id="inflationChart"></canvas>
        </div>
        <div class="card">
            <h2>GDP (Billions USD)</h2>
            <div class="stats" id="gdpStats"></div>
            <div class="filter-buttons">
                <button class="filter-btn" data-range="1M">1M</button>
                <button class="filter-btn" data-range="6M">6M</button>
                <button class="filter-btn" data-range="1Y">1Y</button>
                <button class="filter-btn" data-range="5Y">5Y</button>
                <button class="filter-btn" data-range="10Y">10Y</button>
                <button class="filter-btn" data-range="All">All</button>
            </div>
            <canvas id="gdpChart"></canvas>
        </div>
        <div class="card">
            <h2>Federal Funds Rate (%)</h2>
            <div class="stats" id="ffrStats"></div>
            <div class="filter-buttons">
                <button class="filter-btn" data-range="1M">1M</button>
                <button class="filter-btn" data-range="6M">6M</button>
                <button class="filter-btn" data-range="1Y">1Y</button>
                <button class="filter-btn" data-range="5Y">5Y</button>
                <button class="filter-btn" data-range="10Y">10Y</button>
                <button class="filter-btn" data-range="All">All</button>
            </div>
            <canvas id="ffrChart"></canvas>
        </div>
        <div class="card">
            <h2>10-Year Treasury Yield (%)</h2>
            <div class="stats" id="treasuryStats"></div>
            <div class="filter-buttons">
                <button class="filter-btn" data-range="1M">1M</button>
                <button class="filter-btn" data-range="6M">6M</button>
                <button class="filter-btn" data-range="1Y">1Y</button>
                <button class="filter-btn" data-range="5Y">5Y</button>
                <button class="filter-btn" data-range="10Y">10Y</button>
                <button class="filter-btn" data-range="All">All</button>
            </div>
            <canvas id="treasuryChart"></canvas>
        </div>
        <div class="card">
            <h2>Consumer Sentiment</h2>
            <div class="stats" id="sentimentStats"></div>
            <div class="filter-buttons">
                <button class="filter-btn" data-range="1M">1M</button>
                <button class="filter-btn" data-range="6M">6M</button>
                <button class="filter-btn" data-range="1Y">1Y</button>
                <button class="filter-btn" data-range="5Y">5Y</button>
                <button class="filter-btn" data-range="10Y">10Y</button>
                <button class="filter-btn" data-range="All">All</button>
            </div>
            <canvas id="sentimentChart"></canvas>
        </div>
    </div>
    <script>
        async function fetchAndRender(endpoint, canvasId, statsId, label, color) {
            const res = await fetch(endpoint);
            const rawData = await res.json();
            const reversed = rawData.filter(d => d.value !== '.').reverse();
    
            const card = document.getElementById(canvasId).closest('.card');
            const btnContainer = card.querySelector('.filter-buttons');
            let activeRange = 'All';
            let chartInstance = null;
    
            function filterData(range) {
                const now = new Date();
                const cutoff = {
                    '1M': new Date(now.getFullYear(), now.getMonth() - 1),
                    '6M': new Date(now.getFullYear(), now.getMonth() - 6),
                    '1Y': new Date(now.getFullYear() - 1, now.getMonth()),
                    '5Y': new Date(now.getFullYear() - 5, now.getMonth()),
                    '10Y': new Date(now.getFullYear() - 10, now.getMonth()),
                    'All': new Date(0)
                }[range];
    
                return reversed.filter(d => new Date(d.date) >= cutoff);
            }
    
            function renderChart(range) {
                const filtered = filterData(range);
                const labels = filtered.map(d => d.date);
                const values = filtered.map(d => parseFloat(d.value));
    
                if (chartInstance) chartInstance.destroy();
    
                chartInstance = new Chart(document.getElementById(canvasId), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label,
                            data: values,
                            borderColor: color,
                            tension: 0.3,
                            pointRadius: 2,
                            fill: false
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { maxTicksLimit: 6 } },
                            y: { grid: { color: 'rgba(0,0,0,0.04)' } }
                        }
                    }
                });
            }
    
            // Summary stats from full dataset
            const current = parseFloat(reversed[reversed.length - 1].value);
            const previous = parseFloat(reversed[reversed.length - 2].value);
            const change = (current - previous).toFixed(2);
            const isUp = change >= 0;
            document.getElementById(statsId).innerHTML = `
                <div class="stat-item">
                    <span class="stat-label">Current</span>
                    <span class="stat-value">${current.toFixed(2)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Change</span>
                    <span class="stat-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '▲' : '▼'} ${Math.abs(change)}
                    </span>
                </div>
            `;
    
            // Filter button logic
            btnContainer.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    btnContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderChart(btn.dataset.range);
                });
            });
    
            // Set All as default active
            btnContainer.querySelector('[data-range="All"]').classList.add('active');
            renderChart('All');
        }
    
        fetchAndRender('/api/unemployment', 'unemploymentChart', 'unemploymentStats', 'Unemployment Rate', '#e63946');
        fetchAndRender('/api/inflation', 'inflationChart', 'inflationStats', 'CPI', '#457b9d');
        fetchAndRender('/api/gdp', 'gdpChart', 'gdpStats', 'GDP', '#2a9d8f');
        fetchAndRender('/api/ffr', 'ffrChart', 'ffrStats', 'Federal Funds Rate', '#e9c46a');
        fetchAndRender('/api/treasury', 'treasuryChart', 'treasuryStats', '10-Year Treasury', '#6a4c93');
        fetchAndRender('/api/sentiment', 'sentimentChart', 'sentimentStats', 'Consumer Sentiment', '#f4a261');
    
        document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    </script>
</body>
</html>
