<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRED Economic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef1f7; color: #333; }
        header {
            background: linear-gradient(135deg, #1a2b4a, #2d4a7a);
            color: white;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.3px; }
        header p { font-size: 0.8rem; opacity: 0.65; margin-top: 4px; }
        #last-updated { font-size: 0.78rem; opacity: 0.6; text-align: right; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            padding: 32px 40px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .stats { display: flex; gap: 32px; margin-bottom: 20px; }
        .stat-item { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #1a2b4a; line-height: 1; }
        .stat-change { font-size: 0.85rem; font-weight: 600; margin-top: 2px; }
        .up { color: #2a9d8f; }
        .down { color: #e63946; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>FRED Dashboard</h1>
            <p>Data sourced from the Federal Reserve Bank of St. Louis</p>
        </div>
        <div id="last-updated"></div>
    </header>
    <div class="grid">
        <div class="card">
            <h2>Unemployment Rate (%)</h2>
            <div class="stats" id="unemploymentStats"></div>
            <canvas id="unemploymentChart"></canvas>
        </div>
        <div class="card">
            <h2>CPI Inflation Index</h2>
            <div class="stats" id="inflationStats"></div>
            <canvas id="inflationChart"></canvas>
        </div>
        <div class="card">
            <h2>GDP (Billions USD)</h2>
            <div class="stats" id="gdpStats"></div>
            <canvas id="gdpChart"></canvas>
        </div>
        <div class="card">
            <h2>Federal Funds Rate (%)</h2>
            <div class="stats" id="ffrStats"></div>
            <canvas id="ffrChart"></canvas>
        </div>
        <div class="card">
            <h2>10-Year Treasury Yield (%)</h2>
            <div class="stats" id="treasuryStats"></div>
            <canvas id="treasuryChart"></canvas>
        </div>
        <div class="card">
            <h2>Consumer Sentiment</h2>
            <div class="stats" id="sentimentStats"></div>
            <canvas id="sentimentChart"></canvas>
        </div>
    </div>
    <script>
        async function fetchAndRender(endpoint, canvasId, statsId, label, color) {
    const res = await fetch(endpoint);
    const data = await res.json();
    const reversed = data.reverse();
    const labels = reversed.map(d => d.date);
    const values = reversed.map(d => parseFloat(d.value));

    // Summary stats
    const current = values[values.length - 1];
    const previous = values[values.length - 2];
    const change = (current - previous).toFixed(2);
    const isUp = change >= 0;
    const statsEl = document.getElementById(statsId);
    statsEl.innerHTML = `
        <div class="stat-item">
            <span class="stat-label">Current</span>
            <span class="stat-value">${current.toFixed(2)}</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Change</span>
            <span class="stat-change ${isUp ? 'up' : 'down'}">
                ${isUp ? '▲' : '▼'} ${Math.abs(change)}
            </span>
        </div>
    `;

    new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            labels,
            datasets: [{ label, data: values, borderColor: color, tension: 0.3, pointRadius: 2, fill: false }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { x: { ticks: { maxTicksLimit: 6 } } }
        }
    });
}

fetchAndRender('/api/unemployment', 'unemploymentChart', 'unemploymentStats', 'Unemployment Rate', '#e63946');
fetchAndRender('/api/inflation', 'inflationChart', 'inflationStats', 'CPI', '#457b9d');
fetchAndRender('/api/gdp', 'gdpChart', 'gdpStats', 'GDP', '#2a9d8f');
fetchAndRender('/api/ffr', 'ffrChart', 'ffrStats', 'Federal Funds Rate', '#e9c46a');
fetchAndRender('/api/treasury', 'treasuryChart', 'treasuryStats', '10-Year Treasury', '#6a4c93');
fetchAndRender('/api/sentiment', 'sentimentChart', 'sentimentStats', 'Consumer Sentiment', '#f4a261');
document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    </script>
</body>
</html>
