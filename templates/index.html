<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRED Economic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        header { background: #1a2b4a; color: white; padding: 20px 40px; }
        header h1 { font-size: 1.6rem; }
        header p { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 32px 40px; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .card h2 { font-size: 1rem; color: #555; margin-bottom: 16px; }
    </style>
</head>
<body>
    <header>
        <h1>FRED Economic Dashboard</h1>
        <p>Data sourced from the Federal Reserve Bank of St. Louis</p>
    </header>
    <div class="grid">
        <div class="card">
            <h2>Unemployment Rate (%)</h2>
            <canvas id="unemploymentChart"></canvas>
        </div>
        <div class="card">
            <h2>CPI Inflation Index</h2>
            <canvas id="inflationChart"></canvas>
        </div>
        <div class="card">
            <h2>GDP (Billions USD)</h2>
            <canvas id="gdpChart"></canvas>
        </div>
    </div>
    <script>
        async function fetchAndRender(endpoint, canvasId, label, color) {
            const res = await fetch(endpoint);
            const data = await res.json();
            const reversed = data.reverse();
            const labels = reversed.map(d => d.date);
            const values = reversed.map(d => parseFloat(d.value));

            new Chart(document.getElementById(canvasId), {
                type: 'line',
                data: {
                    labels,
                    datasets: [{ label, data: values, borderColor: color, tension: 0.3, pointRadius: 2, fill: false }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { x: { ticks: { maxTicksLimit: 6 } } }
                }
            });
        }

        fetchAndRender('/api/unemployment', 'unemploymentChart', 'Unemployment Rate', '#e63946');
        fetchAndRender('/api/inflation', 'inflationChart', 'CPI', '#457b9d');
        fetchAndRender('/api/gdp', 'gdpChart', 'GDP', '#2a9d8f');
    </script>
</body>
</html>
